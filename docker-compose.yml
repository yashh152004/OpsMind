version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: opsmind-mysql
    environment:
      MYSQL_DATABASE: opsmind
      MYSQL_ROOT_PASSWORD: ***SCRUBBED_DB_PASSWORD***
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsmind-network

volumes:
  mysql_data:

networks:
  opsmind-network:
    driver: bridge
