spring:
  application:
    name: opsmind-backend
  datasource:
    url: jdbc:mysql://localhost:3306/opsmind?createDatabaseIfNotExist=true
    username: root
    password: ***SCRUBBED_DB_PASSWORD***
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ***SCRUBBED_JWT_SECRET***
  expiration: 86400000 # 24 hours

gemini:
  api:
    key: ${GEMINI_API_KEY:your_gemini_api_key_here}
    url: https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent
