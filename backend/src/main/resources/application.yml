spring:
  application:
    name: opsmind-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/opsmind?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.opsmind: DEBUG

# OpsMind AI V2 - Enterprise Intelligence Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
    model-name: gemini-1.5-flash
    url: https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent

jwt:
  secret: ${JWT_SECRET:amV3dC1zZWNyZXQta2V5LWRldmVsb3BtZW50LXVzZS1vbmx5LW1ha2UtaXQtbG9uZy1lbm91Z2gtZm9yLWgyNTY=}
  expiration: 86400000 # 24 hours
